# Build and publish release binaries when a version tag is pushed.
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Produces archives + SHA256 checksums for:
#   - x86_64-unknown-linux-gnu
#   - aarch64-unknown-linux-gnu
#   - x86_64-apple-darwin
#   - aarch64-apple-darwin
#   - x86_64-pc-windows-msvc

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build -p mcplint-cli --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/mcplint"
          VERSIONED="mcplint-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          UNVERSIONED="mcplint-${{ matrix.target }}.tar.gz"
          tar czf "$VERSIONED" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          cp "$VERSIONED" "$UNVERSIONED"
          shasum -a 256 "$VERSIONED" > "$VERSIONED.sha256"
          shasum -a 256 "$UNVERSIONED" > "$UNVERSIONED.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "target/${{ matrix.target }}/release/mcplint.exe"
          $VERSIONED = "mcplint-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $UNVERSIONED = "mcplint-${{ matrix.target }}.zip"
          Compress-Archive -Path $BIN -DestinationPath $VERSIONED
          Copy-Item $VERSIONED $UNVERSIONED
          $hash1 = (Get-FileHash -Algorithm SHA256 $VERSIONED).Hash.ToLower()
          "$hash1  $VERSIONED" | Out-File -Encoding utf8 "$VERSIONED.sha256"
          $hash2 = (Get-FileHash -Algorithm SHA256 $UNVERSIONED).Hash.ToLower()
          "$hash2  $UNVERSIONED" | Out-File -Encoding utf8 "$UNVERSIONED.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcplint-${{ matrix.target }}
          path: |
            mcplint-*.tar.gz
            mcplint-*.zip
            mcplint-*.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mcplint-*.tar.gz
            artifacts/mcplint-*.zip
            artifacts/mcplint-*.sha256

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order with retry
          for crate in mcplint-core mcplint-rules mcplint-report mcplint-cli; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --locked || echo "::warning::Failed to publish $crate (may already be published)"
            # Wait for crates.io index to update
            sleep 30
          done

  npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from Cargo.toml
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Copy LICENSE
        run: cp LICENSE npm/LICENSE

      - name: Publish
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

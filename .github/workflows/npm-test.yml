name: npm Package Check

on:
  push:
    paths: ['npm/**']
  pull_request:
    paths: ['npm/**']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate package
        run: |
          cd npm
          node -e "const pkg = require('./package.json'); console.log(pkg.name, pkg.version)"
          node -c install.js
          node -c bin/mcplint.js
      - name: Dry-run pack
        run: cd npm && npm pack --dry-run

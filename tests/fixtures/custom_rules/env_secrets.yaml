id: "TEST005"
title: "Servers must not have hardcoded database URLs"
description: "Database connection strings should use environment variable references."
severity: critical
confidence: high
category: static
remediation: "Replace hardcoded database URL with ${DATABASE_URL} reference."
match:
  server:
    env:
      has_key: "*DATABASE*|*DB_URL*|*CONN*"
      value_matches: "postgres://*|mysql://*|mongodb://*"
